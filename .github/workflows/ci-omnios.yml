name: ci-omnios

on:
  push:
    paths:
      - "**"
      - "!android/**"
      - "!docs/**"
      - "docs/Makefile.am"
      - "!ios/**"
      - "!macosx/**"
      - "!msvcstuff/**"
      - "!win32/**"
      - "!AUTHORS"
      - "!ChangeLog"
      - "!COPYING"
      - "!FAQ"
      - "!INSTALL"
      - "!NEWS"
      - "!**README**"
      - "!**.ico"
      - "!**.md"
      - "!**.png"
      - "!**.txt"
      - "!.clang*"
      - "!.gitignore"
      - "!.gitattributes"
      - "!.github/workflows/*"
      - ".github/workflows/ci-omnios.yml"
  pull_request:
    paths:
      - "**"
      - "!android/**"
      - "!docs/**"
      - "docs/Makefile.am"
      - "!ios/**"
      - "!macosx/**"
      - "!msvcstuff/**"
      - "!win32/**"
      - "!AUTHORS"
      - "!ChangeLog"
      - "!COPYING"
      - "!FAQ"
      - "!INSTALL"
      - "!NEWS"
      - "!**README**"
      - "!**.ico"
      - "!**.md"
      - "!**.png"
      - "!**.txt"
      - "!.clang*"
      - "!.gitignore"
      - "!.gitattributes"
      - "!.github/workflows/*"
      - ".github/workflows/ci-omnios.yml"

jobs:
  ci-omnios:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Build Exult in OmniOS
      id: ci-omnios
      uses: vmactions/omnios-vm@v1
      with:
        usesh: true
        sync: rsync
        copyback: false
        prepare: |
          pkg update -v pkg || true
          pkg update -v || true
          pkg install gcc13
          pkg install llvm-17
          pkg install clang-17
          curl -ORL https://pkgsrc.SmartOS.org/packages/SmartOS/bootstrap/bootstrap-2025Q4-x86_64.tar.gz
          tar -zxpf bootstrap-2025Q4-x86_64.tar.gz -C /
          export PATH=/opt/local/bin:/opt/local/sbin:$PATH
          export MANPATH=/opt/local/man:${MANPATH:-}
          pkgin -y update
          pkgin -y upgrade
          pkgin -y install at-spi2-core xorgproto
          pkgin -y install alsa-lib fluidsynth libogg libvorbis
          pkgin -y install autoconf autoconf-archive automake bison flex gettext \
                           git glib2 gmake icu json-glib libtool pkgconf SDL3
          pkgin -y install cairo gdk-pixbuf2 gegl png
          pkgin -y install freetype2 harfbuzz
          pkgin -y install fontconfig
          pkgin -y install gtk3+ pango
          pkgin -y install babl libX11 libXext
          pkgin -y install git cmake libusb libunwind ffmpeg7
          git -c advice.detachedHead=false clone --branch release-3.2.6 --depth 1 https://github.com/libsdl-org/SDL_image SDL3_image
          cd SDL3_image
          mkdir -p build
          cmake -B build -S .
          cmake --build build
          cmake --install build
          cd ..
        run: |
          export PATH=/opt/local/bin:/opt/local/sbin:/usr/local/bin:$PATH
          export MANPATH=/opt/local/man:/opt/local/share/man:/usr/local/share/man:${MANPATH:-}
          export PKG_CONFIG_PATH=/opt/local/share/pkgconfig:/opt/local/lib/pkgconfig:/opt/ooce/lib/amd64/pkgconfig:/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH:-}
          autoreconf -v -i
          # Gimp Plugin is not tested as there is no The Gimp 3.x package
          ./configure --with-debug=extreme --enable-exult-studio --enable-exult-studio-support --enable-compiler \
            --enable-zip-support --enable-shared --enable-midi-sfx --enable-shp-thumbnailer --enable-data --enable-mods \
            --with-usecode-debugger=yes --enable-usecode-container --enable-nonreadied-objects --enable-aseprite-plugin \
            CXX=clang++ CC=clang
          make -j 2
  notify:
    if: ${{ always() }}
    needs:
      - ci-omnios
    uses: ./.github/workflows/notify.yml
    with:
      build_name: "The Exult OmniOS build"
      build_result: ${{ needs.ci-omnios.result }}
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
