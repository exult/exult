name: snapshots-windows

on: [workflow_call]

jobs:
  activity_check:
    runs-on: ubuntu-latest
    steps:
      - name: Activity check
        id: activity_check
        shell: bash
        run: |
          DATEUTC=$((curl -sL -H "Authorization: Bearer ${{ github.token }}" https://api.github.com/repos/exult/exult/commits | jq -r '.[0].commit.committer.date') || date --utc -Iminutes)
          TIMESTAMP=$(date --utc -d "$DATEUTC" +%s)
          DAYS=$(( ($(date --utc -d "0:00" +%s) - $TIMESTAMP) / 86400 ))
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo repo_alive=true >> $GITHUB_OUTPUT
            echo event is workflow_dispatch. Force building snapshot not doing activity check
          else
            if [ $DAYS -gt 0 ]; then
              echo repo_alive=false >> $GITHUB_OUTPUT
              echo "No activity in 24 hours before midnight UTC not building snapshot. Last activity at $DATEUTC."
              mkdir -p windows-snapshot
              echo "No activity" >> windows-snapshot/Windows-not-built
            else
              echo repo_alive=true >> $GITHUB_OUTPUT
            fi
          fi
    outputs: 
      repo_alive: ${{steps.activity_check.outputs.repo_alive}}


  building:
    runs-on: ${{ matrix.runner }}
    needs: [activity_check]
    if: ${{needs.activity_check.outputs.repo_alive == 'true'}}
    strategy:
      fail-fast: false
      matrix:
        sys: [mingw32, clang64, clangarm64]
        include:
          - { sys: mingw32, env: mingw-w64-i686, runner: windows-2022 }
          - { sys: clang64, env: mingw-w64-clang-x86_64, runner: windows-2022}
          - { sys: clangarm64, env: mingw-w64-clang-aarch64, runner: windows-11-arm }
    defaults:
      run:
        shell: msys2 {0}        
    env:
      msystem: ${{ matrix.sys }}    
    steps:
      - name: Install dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.sys }}
          update: true
          release: true
          install: |
            base-devel git p7zip zip
            ${{ matrix.env }}-toolchain ${{ matrix.env }}-binutils ${{ matrix.env }}-ntldd 
            ${{ matrix.env }}-fluidsynth ${{ matrix.env }}-libogg ${{ matrix.env }}-libvorbis
            ${{ matrix.env }}-libpng ${{ matrix.env }}-zlib
             ${{ matrix.env }}-freetype            
             ${{ matrix.env }}-autotools ${{ matrix.env }}-cmake            
      - name: Install dependencies 64bit only
        if: ${{ matrix.sys != 'mingw32' }}
        run: >
          pacman --noconfirm -S --needed --overwrite '*' 
          ${{ matrix.env }}-sdl3
          ${{ matrix.env }}-libtimidity 
          ${{ matrix.env }}-munt-mt32emu ${{ matrix.env }}-sdl3-image
          ${{ matrix.env }}-gtk3 ${{ matrix.env }}-adwaita-icon-theme ${{ matrix.env }}-libxml2 
          ${{ matrix.env }}-gimp ${{ matrix.env }}-icu            
      - name: Checkout munt
        if: ${{ matrix.sys == 'mingw32' }}
        uses: actions/checkout@v4
        with:
          repository: munt/munt
          ref: libmt32emu_2_7_2
          path: libmt32emu

      - name: Install mingw32/mt32emu
        if: ${{ matrix.sys == 'mingw32'}}
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p munt
          cd munt
          cmake --version
          cmake ./../libmt32emu -Dmunt_WITH_MT32EMU_SMF2WAV=FALSE -Dmunt_WITH_MT32EMU_QT=FALSE -DCMAKE_INSTALL_PREFIX=$MINGW_PREFIX
          ninja install

      - name: Restore downloads Cache 
        if: ${{  matrix.sys == 'mingw32'}}
        uses: actions/cache/restore@v4
        id: downoads-cache-restore
        with:
          path: downloads
          key: snapshot-windows-downloads-${{github.run_number}}-${{github.run_attempt}}
          restore-keys: |
            snapshot-windows-downloads

      - name: Download additional dependencies for mingw32 i686
        if: ${{  matrix.sys == 'mingw32'}}
        run: |
         declare -A urls_and_sha256=(
         [https://github.com/libsdl-org/SDL/releases/download/release-3.2.14/SDL3-devel-3.2.14-mingw.tar.gz]=f620a946726d90037a9763c9f6dc29681b806c1aa3674d8d613eb689e25a6839
         [https://github.com/libsdl-org/SDL_image/releases/download/release-3.2.4/SDL3_image-devel-3.2.4-mingw.tar.gz]=ae95f264b62cd8e4750ef91d5b25f82729e676e1fb45ec50abdca49289aa81b6
         [https://github.com/unicode-org/icu/releases/download/release-77-1/icu4c-77_1-src.tgz]=588e431f77327c39031ffbb8843c0e3bc122c211374485fa87dc5f3faff24061
         [https://sourceforge.net/projects/libtimidity/files/libtimidity/0.2.7/libtimidity-0.2.7.tar.gz]=26447cbc049fb262e26b640e42c063e8694133aa92ff145e0d0b15a03a352e6a
         )
         mkdir downloads 2>/dev/null || true
         for url in "${!urls_and_sha256[@]}"; do
           hash=${urls_and_sha256[$url]}
           filename="downloads/$(basename -- $url)"
           if echo "$hash *$filename"  |sha256sum --status -c 2>/dev/null; then
           echo $url already downloaded
           else
           echo $url needs to be downloaded
               curl -L $url -o $filename
           fi
               echo "$hash *$filename"  |sha256sum -c
         done         

      - name: Save downloads to cache
        if: ${{  matrix.sys == 'mingw32'}}
        id: downloads-cache-save
        uses: actions/cache/save@v4
        with:
          path: downloads
          key: snapshot-windows-downloads-${{github.run_number}}-${{github.run_attempt}}

      - name: Manually install SDL3-devel-3.2.14-mingw.tar.gz for mingw32 i686
        if: ${{  matrix.sys == 'mingw32'}}
        env:
         msystem: ${{ matrix.sys }}
        run: |
         tar xfz downloads/SDL3-devel-3.2.14-mingw.tar.gz
         cp -r -v SDL3-3.2.14/i686-w64-mingw32/* $MINGW_PREFIX
         rm -r -f SDL3-3.2.14 downloads/SDL3-devel-3.2.14-mingw.tar.gz

      - name: Manually install SDL3_image-devel-3.2.4-mingw.tar.gz for mingw32 i686      
        if: ${{  matrix.sys == 'mingw32'}}
        run: |
         tar xfz downloads/SDL3_image-devel-3.2.4-mingw.tar.gz
         cp -r -v SDL3_image-3.2.4/i686-w64-mingw32/* $MINGW_PREFIX
         rm -r -f SDL3_image-3.2.4 downloads/SDL3_image-devel-3.2.4-mingw.tar.gz

      - name: Build and install icu4c 77.1 for mingw32 i686      
        if: ${{  matrix.sys == 'mingw32'}}
        run: |
         tar xfz downloads/icu4c-77_1-src.tgz
         cd icu/source
         autoreconf -vfi
         ./configure \
         --enable-shared \
         --with-data-packaging=dll \
         --disable-tests \
         --disable-samples \
         --enable-release
         make -j
         make -j install
         cd ../..
         rm -r -f downloads/icu4c-77_1-src.tgz icu

      - name: Build and install libtimidity 0.2.7 for mingw32 i686
        if: ${{ matrix.sys == 'mingw32'}}
        run: |
         tar xfz downloads/libtimidity-0.2.7.tar.gz
         cd libtimidity-0.2.7/
         autoreconf -vfi
         ./configure \
         --enable-shared \
         --enable-static \
         --disable-ao 
         make -j
         make -j install
         cd ..
         rm -r -f downloads/libtimidity-0.2.7.tar.gz libtimidity-0.2.7

      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Exult
        run: |
          make -j 5 -f Makefile.mingw SNAPSHOT=1 DISTPATH=distdir DEBUG_LEVEL=-g1 dist 
          make -j 5 -f Makefile.mingw SNAPSHOT=1 DISTPATH=distdir DEBUG_LEVEL=-g1 disttest 
          mkdir -p dist/unstripped/${{matrix.sys}}
          cp Exult.exe dist/unstripped/${{matrix.sys}}

      - name: Build Tools
        if: ${{ matrix.sys != 'mingw32'}}
        run: |
          make -j 5 -f Makefile.mingw SNAPSHOT=1 DISTPATH=distdir DEBUG_LEVEL=-g1 studiodist toolsdist plugindist aseprite-plugindist
          mkdir -p distdir/unstripped/${{matrix.sys}}
          cp *.exe distdir/unstripped/${{matrix.sys}}

      - name: Upload build 
        uses: actions/upload-artifact@v4
        with:
          name: "build-${{matrix.env}}"
          path: distdir/
          retention-days: 1
          compression-level: 0

  Installers:
    runs-on: windows-2022
    needs: [building, activity_check]
    if: ${{needs.activity_check.outputs.repo_alive == 'true'}}
    defaults:
      run:
        shell: bash
    steps:
      - name: download Build artifacts
        uses: actions/download-artifact@v8
        with:
          path: ~/Exult-dist
          pattern: build*
          merge-multiple: true
      - name: Create installers     
        
        run: |
          SNAPSHOT_PATH=$(cygpath -m ~/Exult-dist)
          cd "${SNAPSHOT_PATH}"
          "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" exult_installer.iss
          "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" -DNO_i686=1 exult_studio_installer.iss
          "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" -DNO_i686=1 exult_tools_installer.iss
          "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" -DNO_i686=1 exult_shpplugin_installer.iss
          "/c/Program Files/7-Zip/7z.exe" -tzip a exult_shp_win64.aseprite-extension -mx9 -mmt ./AsepritePlugin-x86_64/*
          "/c/Program Files/7-Zip/7z.exe" -tzip a exult_shp_win_arm64.aseprite-extension -mx9 -mmt ./AsepritePlugin-aarch64/*

      - name: Save artifacts
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p windows-snapshot
          SNAPSHOT_PATH=$(cygpath -m ~/Exult-dist)
          cp "${SNAPSHOT_PATH}/Exult.exe" ./windows-snapshot
          cp "${SNAPSHOT_PATH}/ExultStudio.exe"  ./windows-snapshot
          cp "${SNAPSHOT_PATH}/ExultTools.exe" ./windows-snapshot
          cp "${SNAPSHOT_PATH}/Gimp30Plugin.exe" ./windows-snapshot
          cp "${SNAPSHOT_PATH}/Exult/mods/bgKeyring.zip" ./windows-snapshot/Keyring.zip
          cp "${SNAPSHOT_PATH}/Exult/mods/islefaq.zip" ./windows-snapshot/SFisland.zip
          cp "${SNAPSHOT_PATH}/Exult/mods/sifixes.zip" ./windows-snapshot/Sifixes.zip
          cp "${SNAPSHOT_PATH}/exult_shp_win64.aseprite-extension" ./windows-snapshot
          cp "${SNAPSHOT_PATH}/exult_shp_win_arm64.aseprite-extension" ./windows-snapshot

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "windows snapshot"
          path: windows-snapshot

      - name: Upload unstripped executable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "Unstripped Windows executables"
          path: |
           ~/Exult-dist/unstripped/
          compression-level: 9
      - name: Delete Build artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: build*
          failOnError: false
