name: ci-freebsd

on:
  push:
    paths:
      - "**"
      - "!android/**"
      - "!docs/**"
      - "docs/Makefile.am"
      - "!ios/**"
      - "!macosx/**"
      - "!msvcstuff/**"
      - "!win32/**"
      - "!AUTHORS"
      - "!ChangeLog"
      - "!COPYING"
      - "!FAQ"
      - "!INSTALL"
      - "!NEWS"
      - "!**README**"
      - "!**.ico"
      - "!**.md"
      - "!**.png"
      - "!**.txt"
      - "!.clang*"
      - "!.gitignore"
      - "!.gitattributes"
      - "!.github/workflows/*"
      - ".github/workflows/ci-freebsd.yml"
  pull_request:
    paths:
      - "**"
      - "!android/**"
      - "!docs/**"
      - "docs/Makefile.am"
      - "!ios/**"
      - "!macosx/**"
      - "!msvcstuff/**"
      - "!win32/**"
      - "!AUTHORS"
      - "!ChangeLog"
      - "!COPYING"
      - "!FAQ"
      - "!INSTALL"
      - "!NEWS"
      - "!**README**"
      - "!**.ico"
      - "!**.md"
      - "!**.png"
      - "!**.txt"
      - "!.clang*"
      - "!.gitignore"
      - "!.gitattributes"
      - "!.github/workflows/*"
      - ".github/workflows/ci-freebsd.yml"

jobs:
  ci-freebsd:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Build Exult in FreeBSD
      id: ci-freebsd
      uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        sync: rsync
        copyback: false
        prepare: |
          pkg update
          pkg upgrade -y
          pkg install -y at-spi2-core
          pkg install -y alsa-lib fluidsynth libogg libvorbis
          pkg install -y autoconf autoconf-archive automake bison flex gettext-runtime \
                         git glib gmake icu json-glib libtool pkgconf sdl2 sdl2_image
          pkg install -y cairo gdk-pixbuf2 gegl gimp-app png
          pkg install -y freetype2 harfbuzz
          pkg install -y fontconfig
          pkg install -y gtk2 gtk3 pango
          pkg install -y babl libX11 libXext
          pkg install -y git cmake libunwind ffmpeg
          git -c advice.detachedHead=false clone --branch release-3.2.14 --depth 1 https://github.com/libsdl-org/SDL SDL3
          cd SDL3
          mkdir -p build
          cmake -B build -S .
          cmake --build build
          cmake --install build
          cd ..
          git -c advice.detachedHead=false clone --branch release-3.2.4 --depth 1 https://github.com/libsdl-org/SDL_image SDL3_image
          cd SDL3_image
          mkdir -p build
          cmake -B build -S .
          cmake --build build
          cmake --install build
          cd ..
        run: |
          autoreconf -v -i
          ./configure --with-debug=extreme --enable-exult-studio --enable-exult-studio-support --enable-compiler --enable-gimp-plugin \
            --enable-zip-support --enable-shared --enable-midi-sfx --enable-shp-thumbnailer --enable-data --enable-mods \
            --with-usecode-debugger=yes --enable-usecode-container --enable-nonreadied-objects --enable-aseprite-plugin \
            CXX=clang++ CC=clang
          make -j 2
  notify:
    if: ${{ always() }}
    needs:
      - ci-freebsd
    uses: ./.github/workflows/notify.yml
    with:
      build_name: "The Exult FreeBSD build"
      build_result: ${{ needs.ci-freebsd.result }}
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
